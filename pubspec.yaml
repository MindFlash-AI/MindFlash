publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  uuid: ^4.2.2
  file_picker: ^8.1.2
  syncfusion_flutter_pdf: ^33.1.46
  http: ^1.2.0
  lottie: ^3.1.0
  flutter_markdown: ^0.7.4
  flutter_local_notifications: ^17.0.1
  timezone: ^0.9.2
